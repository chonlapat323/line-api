services:
  postgres:
    image: postgres:16-alpine
    container_name: line_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: line_sender
    ports:
      - "5433:5432"
    volumes:
      - line_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  line_pgdata:
